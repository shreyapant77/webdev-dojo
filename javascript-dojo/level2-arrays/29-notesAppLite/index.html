<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initail-scale=1.0">

        <title>Notes App Lite</title>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <h1>Notes App Lite</h1>
        <textarea class="txt" placeholder="write your note here"></textarea>
        <button class="btn1">Add Note </button>
        <input class="del" placeholder="enter number of note you want to delete">
        <button class="btn2">Delete</button>
        <input class="edit" placeholder="enter number of note you want to edit">
        <input class="editTxt" placeholder="enter the text you want to edit">
        <button class="btn3">Edit</button>
        <p class="para"></p>



        <script src="script.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,inital-scale=1.0">

        <title>product filter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>this is product filter app</h1>
        <h2>enter product</h2>
        <input class="inpt1" placeholder="enter name of the product">
        <select class="prod-type">
            <option value="electronics">Electronics</option>
            <option value="groceries">Grocery</option>
            <option value="footwear">Footwear</option>
            <option value="makeup">Makeup</option>
            <option value="clothings">Clothings</option>
        </select>
        <button class="btn1">enter product</button>


        <h2>choose the category you want to browse</h2>
        <select class="filter-type">
            <option value="electronics">Electronics</option>
            <option value="groceries">Grocery</option>
            <option value="footwear">Footwear</option>
            <option value="makeup">Makeup</option>
            <option value="clothings">Clothings</option>
        </select>
        <button class="btn2">choose category</button>

        <p class="para">the filtered products will be shown here :</p>


        <script src="script.js"></script>
    </body>
</html>

        <title>todo complete toggle</title>

    </head>
    <body>
       
        <h1>todo list</h1>
        <h2>input feauture</h2>
        <input class="inpt1" placeholder="enter task you want to do">

        <h2>render todo list</h2>
        <p class="para">the todo list will be rendered here</p>
